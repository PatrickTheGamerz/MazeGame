<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browser Voxel Builder</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #87CEEB; /* Sky blue */
      font-family: Arial, sans-serif;
    }
    /* Simple crosshair */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 100;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
    }
    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    
    /* Start screen */
    #instructions {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      color: white;
      cursor: pointer;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="instructions">
    <h1>Browser Voxel Builder</h1>
    <p>Click anywhere to start</p>
    <p><strong>WASD</strong>: Move | <strong>SPACE</strong>: Jump</p>
    <p><strong>Left Click</strong>: Break Block | <strong>Right Click</strong>: Place Block</p>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
    import { PointerLockControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/PointerLockControls.js';

    // 1. Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. Lighting
    const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75);
    light.position.set(0.5, 1, 0.75);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // 3. Controls & Physics Variables
    const controls = new PointerLockControls(camera, document.body);
    const instructions = document.getElementById('instructions');

    instructions.addEventListener('click', () => { controls.lock(); });
    controls.addEventListener('lock', () => { instructions.style.display = 'none'; });
    controls.addEventListener('unlock', () => { instructions.style.display = 'flex'; });
    scene.add(controls.getObject());

    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;

    // Movement Key Listeners
    document.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyD': moveRight = true; break;
        case 'Space': if (canJump) velocity.y += 20; canJump = false; break;
      }
    });
    document.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyD': moveRight = false; break;
      }
    });

    // 4. Block Generation & Interaction
    const objects = []; // Array to store interactable blocks
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    
    // Create grass texture material
    const material = new THREE.MeshLambertMaterial({ color: 0x44aa44 }); 
    const dirtMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 }); // Used for placing new blocks

    // Generate a 20x20 floor
    for (let i = -10; i < 10; i++) {
      for (let j = -10; j < 10; j++) {
        const voxel = new THREE.Mesh(boxGeo, material);
        voxel.position.set(i, -1, j); // Place below player
        scene.add(voxel);
        objects.push(voxel);
      }
    }

    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0); // Center of the screen for placing/breaking

    // Mouse Clicks for Breaking/Placing
    document.addEventListener('mousedown', (event) => {
      if (!controls.isLocked) return;
      
      raycaster.setFromCamera(center, camera);
      const intersects = raycaster.intersectObjects(objects);

      if (intersects.length > 0) {
        const intersect = intersects[0];
        
        // Prevent interacting too far away
        if (intersect.distance > 5) return; 

        if (event.button === 0) { 
          // Left Click: Break Block
          scene.remove(intersect.object);
          objects.splice(objects.indexOf(intersect.object), 1);
        } else if (event.button === 2) { 
          // Right Click: Place Block
          const voxel = new THREE.Mesh(boxGeo, dirtMaterial);
          voxel.position.copy(intersect.point).add(intersect.face.normal);
          voxel.position.divideScalar(1).floor().addScalar(0.5); // Snap to grid
          scene.add(voxel);
          objects.push(voxel);
        }
      }
    });

    // Prevent context menu on right click
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 5. Game Loop
    let prevTime = performance.now();
    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now();

      if (controls.isLocked === true) {
        const delta = (time - prevTime) / 1000;

        // Apply friction and gravity
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;
        velocity.y -= 9.8 * 6.0 * delta; // Gravity

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);
        controls.getObject().position.y += (velocity.y * delta);

        // Basic floor collision (stops you from falling forever)
        if (controls.getObject().position.y < 1) {
          velocity.y = 0;
          controls.getObject().position.y = 1;
          canJump = true;
        }
      }

      prevTime = time;
      renderer.render(scene, camera);
    }

    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
