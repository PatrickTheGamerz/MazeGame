<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORANGECRAFT V5</title>
  <style>
    @font-face { font-family: 'Minecraftia'; src: local('Courier New'); }
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; color: white; }
    
    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); }
    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    
    /* HUD: Health, Hunger, Hotbar */
    #hud { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; z-index: 100; width: 100%; pointer-events: none;}
    .stats { display: flex; justify-content: space-between; width: 350px; font-size: 20px; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; }
    .hearts { color: #ff3333; }
    .hunger { color: #cc6600; }
    #hotbar { display: flex; background: rgba(0,0,0,0.5); border: 2px solid #555; padding: 2px; margin-bottom: 10px; }
    .slot { width: 36px; height: 36px; border: 2px solid #888; background: rgba(100,100,100,0.5); margin: 0 2px; }
    .slot.active { border: 2px solid white; }

    /* Chat System */
    #chat-container { position: absolute; bottom: 80px; left: 20px; width: 400px; display: none; flex-direction: column; z-index: 150; }
    #chat-log { display: flex; flex-direction: column; justify-content: flex-end; height: 200px; overflow-y: hidden; margin-bottom: 5px; text-shadow: 1px 1px 0 #000; pointer-events: none; }
    .chat-msg { background: rgba(0,0,0,0.4); padding: 2px 5px; margin-bottom: 2px; }
    #chat-input { background: rgba(0,0,0,0.6); color: white; border: 1px solid #555; font-family: inherit; font-size: 16px; padding: 5px; display: none; width: 100%; outline: none; }

    /* Menus */
    .menu-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); z-index: 200; backdrop-filter: blur(2px); }
    #pause-menu, #world-select, #death-screen { display: none; }
    #death-screen { background: rgba(150, 0, 0, 0.7); }
    
    .title { font-size: 5rem; color: #FFA500; text-shadow: 4px 4px 0px #333; margin-bottom: 30px; font-weight: bold; position: relative; }
    
    /* Layout for Pause Menu matching image */
    .btn-row { display: flex; gap: 10px; }
    .btn { width: 300px; padding: 10px; margin: 5px; background-color: #777; border: 2px solid #000; border-top-color: #aaa; border-left-color: #aaa; color: white; font-size: 1.1rem; font-family: inherit; text-align: center; cursor: pointer; text-shadow: 2px 2px 0px #333; }
    .btn.half { width: 140px; }
    .btn:hover { background-color: #888; }
    .btn:active { border-top-color: #000; border-left-color: #000; border-bottom-color: #aaa; border-right-color: #aaa; }
    .btn.disabled { color: #555; cursor: not-allowed; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  
  <div id="crosshair"></div>
  
  <div id="hud">
    <div class="stats">
      <div class="hearts" id="health-display">♥♥♥♥♥♥♥♥♥♥</div>
      <div class="hunger">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div>
    </div>
    <div id="hotbar">
      <div class="slot active"></div><div class="slot"></div><div class="slot"></div>
      <div class="slot"></div><div class="slot"></div><div class="slot"></div>
      <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
  </div>

  <div id="chat-container">
    <div id="chat-log"></div>
    <input type="text" id="chat-input" autocomplete="off">
  </div>

  <div id="main-menu" class="menu-overlay">
    <div class="title">ORANGECRAFT</div>
    <div class="btn" id="btn-singleplayer">Singleplayer</div>
    <div class="btn disabled">Multiplayer</div>
    <div class="btn disabled">Options...</div>
  </div>

  <div id="pause-menu" class="menu-overlay">
    <div style="font-size: 1.5rem; margin-bottom: 20px; text-shadow: 2px 2px #000;">Game Menu</div>
    <div class="btn" id="btn-resume" style="width: 300px;">Back to Game</div>
    <div class="btn-row">
      <div class="btn half disabled">Advancements</div>
      <div class="btn half disabled">Statistics</div>
    </div>
    <div class="btn-row">
      <div class="btn half disabled">Give Feedback</div>
      <div class="btn half disabled">Report Bugs</div>
    </div>
    <div class="btn disabled" style="width: 300px; margin-top: 15px;">Open to LAN</div>
    <div class="btn-row">
      <div class="btn half disabled">Options...</div>
      <div class="btn half disabled">Mod Options...</div>
    </div>
    <div class="btn" id="btn-quit" style="width: 300px; margin-top: 15px;">Save and Quit to Title</div>
  </div>

  <script>
    // --- Textures ---
    function genTex(base, variance, type) {
      const canvas = document.createElement('canvas');
      canvas.width = 16; canvas.height = 16;
      const ctx = canvas.getContext('2d');
      for (let x = 0; x < 16; x++) {
        for (let y = 0; y < 16; y++) {
          let noise = Math.random() * variance - (variance/2);
          let r = base[0]+noise, g = base[1]+noise, b = base[2]+noise;
          if (type === 'bedrock') { r=g=b= Math.random() * 50; }
          ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
          ctx.fillRect(x, y, 1, 1);
        }
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.magFilter = THREE.NearestFilter;
      return tex;
    }

    const mats = {
      grass: new THREE.MeshLambertMaterial({ map: genTex([80, 160, 80], 30) }),
      dirt: new THREE.MeshLambertMaterial({ map: genTex([110, 70, 40], 25) }),
      stone: new THREE.MeshLambertMaterial({ map: genTex([120, 120, 120], 40) }),
      bedrock: new THREE.MeshLambertMaterial({ map: genTex([20, 20, 20], 0, 'bedrock') })
    };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 60);
    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    // --- World Gen (Deep Caves & Bedrock) ---
    let blocks = [];
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    
    function buildWorld() {
      const mapSize = 40;
      for (let x = -mapSize/2; x < mapSize/2; x++) {
        for (let z = -mapSize/2; z < mapSize/2; z++) {
          let surfaceY = Math.floor(Math.sin(x/8)*3 + Math.cos(z/8)*3);
          
          // Generate deep down to y = -15
          for (let y = -15; y <= surfaceY; y++) {
            let mat = mats.stone;
            if (y === surfaceY) mat = mats.grass;
            else if (y > surfaceY - 3) mat = mats.dirt;
            else if (y === -15) mat = mats.bedrock;

            const b = new THREE.Mesh(boxGeo, mat);
            b.position.set(x, y, z);
            b.isBreakable = (mat !== mats.bedrock);
            scene.add(b);
            blocks.push(b);
          }
        }
      }
    }
    buildWorld();

    // --- Game State & UI ---
    let gameState = "MAIN_MENU";
    let isChatting = false;

    function setMenu(state) {
      gameState = state;
      document.getElementById('main-menu').style.display = state === "MAIN_MENU" ? 'flex' : 'none';
      document.getElementById('pause-menu').style.display = state === "PAUSED" ? 'flex' : 'none';
      document.getElementById('hud').style.display = state === "PLAYING" ? 'flex' : 'none';
      document.getElementById('chat-container').style.display = (state === "PLAYING" || state === "CHATTING") ? 'flex' : 'none';
      document.getElementById('crosshair').style.display = state === "PLAYING" ? 'block' : 'none';
      
      if(state === "PLAYING") document.body.requestPointerLock();
      else document.exitPointerLock();
    }

    document.getElementById('btn-singleplayer').onclick = () => { camera.position.set(0, 10, 0); setMenu("PLAYING"); };
    document.getElementById('btn-resume').onclick = () => setMenu("PLAYING");
    document.getElementById('btn-quit').onclick = () => setMenu("MAIN_MENU");

    // --- Chat Logic ---
    const chatInput = document.getElementById('chat-input');
    const chatLog = document.getElementById('chat-log');
    
    function addChat(text) {
      const msg = document.createElement('div');
      msg.className = 'chat-msg';
      msg.innerText = text;
      chatLog.appendChild(msg);
      if(chatLog.children.length > 8) chatLog.removeChild(chatLog.firstChild);
    }

    // --- Controls ---
    const keys = { w: false, a: false, s: false, d: false, space: false };
    
    document.addEventListener('keydown', (e) => {
      if (gameState === "PLAYING" && (e.key === 't' || e.key === '/')) {
        e.preventDefault();
        setMenu("CHATTING");
        chatInput.style.display = 'block';
        chatInput.focus();
        if(e.key === '/') chatInput.value = '/';
        return;
      }
      if (gameState === "CHATTING" && e.key === 'Enter') {
        if(chatInput.value.trim() !== '') addChat("<Player> " + chatInput.value);
        chatInput.value = '';
        chatInput.style.display = 'none';
        setMenu("PLAYING");
        return;
      }
      if (gameState === "CHATTING" && e.key === 'Escape') {
        chatInput.value = '';
        chatInput.style.display = 'none';
        setMenu("PLAYING");
        return;
      }

      if (gameState !== "PLAYING") return;
      if(e.code==='KeyW') keys.w=true; if(e.code==='KeyA') keys.a=true;
      if(e.code==='KeyS') keys.s=true; if(e.code==='KeyD') keys.d=true;
      if(e.code==='Space') keys.space=true; 
    });

    document.addEventListener('keyup', (e) => {
      if(e.code==='KeyW') keys.w=false; if(e.code==='KeyA') keys.a=false;
      if(e.code==='KeyS') keys.s=false; if(e.code==='KeyD') keys.d=false;
      if(e.code==='Space') keys.space=false; 
    });

    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    document.addEventListener('mousemove', (e) => {
      if (gameState !== "PLAYING") return;
      euler.setFromQuaternion(camera.quaternion);
      euler.y -= e.movementX * 0.002;
      euler.x -= e.movementY * 0.002;
      euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
      camera.quaternion.setFromEuler(euler);
    });

    // Pointer lock listener to trigger pause
    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement !== document.body && gameState === "PLAYING") setMenu("PAUSED");
    });

    // --- Building / Perfect Snapping ---
    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);

    document.addEventListener('mousedown', (e) => {
      if (gameState !== "PLAYING") return;
      raycaster.setFromCamera(center, camera);
      const hits = raycaster.intersectObjects(blocks);

      if (hits.length > 0 && hits[0].distance < 6) {
        if (e.button === 0 && hits[0].object.isBreakable) {
          scene.remove(hits[0].object);
          blocks.splice(blocks.indexOf(hits[0].object), 1);
        } else if (e.button === 2) {
          // PERFECT GRID SNAPPING MATH
          const placementPos = new THREE.Vector3().copy(hits[0].point).add(hits[0].face.normal.clone().multiplyScalar(0.5));
          placementPos.x = Math.floor(placementPos.x + 0.5);
          placementPos.y = Math.floor(placementPos.y + 0.5);
          placementPos.z = Math.floor(placementPos.z + 0.5);

          const b = new THREE.Mesh(boxGeo, mats.stone);
          b.position.copy(placementPos);
          b.isBreakable = true;
          scene.add(b); blocks.push(b);
        }
      }
    });

    // --- Physics ---
    let velocity = new THREE.Vector3();
    let canJump = false;
    let time = performance.now();
    const playerRadius = 0.3; // Make player slightly thinner for collisions

    function checkWallCollision(newPos) {
      // Basic Axis-Aligned Bounding Box (AABB) checking against all blocks
      for(let i=0; i<blocks.length; i++) {
        let b = blocks[i].position;
        // Check if player's body intersects with a block's space
        if (Math.abs(newPos.x - b.x) < 0.5 + playerRadius && 
            Math.abs(newPos.z - b.z) < 0.5 + playerRadius &&
            newPos.y > b.y - 1.5 && newPos.y < b.y + 0.5) {
          return true; // Hit a wall!
        }
      }
      return false;
    }

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const delta = Math.min((now - time) / 1000, 0.1);
      time = now;

      if (gameState === "PLAYING") {
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;
        velocity.y -= 30.0 * delta; // Gravity

        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
        const right = new THREE.Vector3();
        right.crossVectors(camera.up, dir).normalize();

        let moveSpeed = 40.0 * delta;
        
        // Desired movement
        let moveX = 0, moveZ = 0;
        if (keys.w) { moveX += dir.x * moveSpeed; moveZ += dir.z * moveSpeed; }
        if (keys.s) { moveX -= dir.x * moveSpeed; moveZ -= dir.z * moveSpeed; }
        if (keys.a) { moveX += right.x * moveSpeed; moveZ += right.z * moveSpeed; }
        if (keys.d) { moveX -= right.x * moveSpeed; moveZ -= right.z * moveSpeed; }

        // Apply X movement and check collision
        let nextPosX = camera.position.clone();
        nextPosX.x += velocity.x * delta + moveX;
        if(!checkWallCollision(nextPosX)) {
          velocity.x += moveX / delta; // Allow movement
          camera.position.x = nextPosX.x;
        } else {
          velocity.x = 0; // Hit wall, stop moving this direction
        }

        // Apply Z movement and check collision
        let nextPosZ = camera.position.clone();
        nextPosZ.z += velocity.z * delta + moveZ;
        if(!checkWallCollision(nextPosZ)) {
          velocity.z += moveZ / delta;
          camera.position.z = nextPosZ.z;
        } else {
          velocity.z = 0;
        }

        camera.position.y += velocity.y * delta;

        // Floor Collision (Allows jumping)
        raycaster.set(camera.position, new THREE.Vector3(0, -1, 0));
        const floorHits = raycaster.intersectObjects(blocks);
        if (floorHits.length > 0 && floorHits[0].distance < 1.6) {
          velocity.y = 0;
          camera.position.y = floorHits[0].point.y + 1.6;
          canJump = true;
        } else { canJump = false; }

        // Realistic Jumping
        if (keys.space && canJump) { 
          velocity.y = 9.5; 
          canJump = false; 
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => { 
      camera.aspect = window.innerWidth / window.innerHeight; 
      camera.updateProjectionMatrix(); 
      renderer.setSize(window.innerWidth, window.innerHeight); 
    });
  </script>
</body>
</html>
