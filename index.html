<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORANGECRAFT V7 - THE INVENTORY UPDATE</title>
  <style>
    @font-face { font-family: 'Minecraftia'; src: local('Courier New'); }
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; color: white; }
    
    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); }
    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    
    /* HUD */
    #hud { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; z-index: 100; width: 100%; pointer-events: none;}
    .stats { display: flex; justify-content: space-between; width: 380px; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; font-size: 24px; }
    .hearts { color: #ff3333; letter-spacing: 2px; }
    .hunger { color: #cc6600; letter-spacing: 2px; }
    
    #hotbar { display: flex; background: rgba(0,0,0,0.5); border: 2px solid #555; padding: 2px; margin-bottom: 10px; }
    .slot { width: 36px; height: 36px; border: 2px solid #888; background: rgba(139,139,139,0.8); margin: 0 2px; border-top-color: #fff; border-left-color: #fff; border-bottom-color: #555; border-right-color: #555;}
    .slot.active { border: 2px solid white; }

    #mining-progress { position: absolute; top: 55%; left: 50%; transform: translateX(-50%); width: 50px; height: 5px; background: rgba(0,0,0,0.5); display: none; border: 1px solid black; }
    #mining-bar { height: 100%; width: 0%; background: #00ff00; }

    /* Menus */
    .menu-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); z-index: 200; backdrop-filter: blur(2px); }
    #pause-menu, #world-select, #death-screen, #inventory-screen { display: none; background: rgba(0,0,0,0.7); }
    #death-screen { background: rgba(150, 0, 0, 0.5); }
    
    .title { font-size: 5rem; color: #FFA500; text-shadow: 4px 4px 0px #333; margin-bottom: 30px; font-weight: bold; position: relative; }
    .btn-row { display: flex; gap: 10px; }
    .btn { width: 300px; padding: 12px; margin: 6px; background-color: #777; border: 2px solid #000; border-top-color: #aaa; border-left-color: #aaa; color: white; font-size: 1.2rem; font-family: inherit; text-align: center; cursor: pointer; text-shadow: 2px 2px 0px #333; }
    .btn:hover { background-color: #888; }
    .btn.disabled { color: #555; cursor: not-allowed; }

    /* Inventory UI */
    .inv-container { background: #c6c6c6; padding: 10px; border: 2px solid #000; width: 450px; height: 350px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
    .inv-title { color: #333; font-size: 14px; margin-bottom: 5px; }
    .inv-top { display: flex; justify-content: space-between; height: 150px; }
    .inv-armor { display: flex; flex-direction: column; gap: 5px; }
    .inv-crafting { display: flex; flex-direction: column; align-items: center; margin-top: 20px;}
    .craft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-right: 10px; }
    .craft-result { width: 36px; height: 36px; border: 2px solid #888; background: #8b8b8b; border-top-color: #333; border-left-color: #333; border-bottom-color: #fff; border-right-color: #fff; margin-top: 15px; margin-left: 20px;}
    .inv-main { display: grid; grid-template-columns: repeat(9, 36px); gap: 4px; justify-content: center; margin-bottom: 10px; }
    .inv-slot { width: 36px; height: 36px; background: #8b8b8b; border: 2px solid #555; border-top-color: #333; border-left-color: #333; border-bottom-color: #fff; border-right-color: #fff; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  
  <div id="crosshair"></div>
  <div id="mining-progress"><div id="mining-bar"></div></div>
  
  <div id="hud">
    <div class="stats"><div class="hearts" id="health-display">♥♥♥♥♥♥♥♥♥♥</div><div class="hunger">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div></div>
    <div id="hotbar">
      <div class="slot active"></div><div class="slot"></div><div class="slot"></div>
      <div class="slot"></div><div class="slot"></div><div class="slot"></div>
      <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
  </div>

  <div id="inventory-screen" class="menu-overlay">
    <div class="inv-container">
      <div class="inv-top">
        <div class="inv-armor">
          <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
        <div style="width: 100px; height: 130px; background: black; border: 2px solid #555;"></div> <div class="inv-crafting">
          <div class="inv-title" style="align-self: flex-start;">Crafting</div>
          <div style="display: flex;">
            <div class="craft-grid">
              <div class="inv-slot"></div><div class="inv-slot"></div>
              <div class="inv-slot"></div><div class="inv-slot"></div>
            </div>
            <div class="craft-result"></div>
          </div>
        </div>
      </div>
      <div>
        <div class="inv-title">Inventory</div>
        <div class="inv-main">
          <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
          <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
          <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
        <div class="inv-main" style="margin-bottom: 0;">
          <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="main-menu" class="menu-overlay">
    <div class="title">ORANGECRAFT</div>
    <div class="btn" id="btn-singleplayer">Singleplayer</div>
  </div>

  <div id="pause-menu" class="menu-overlay">
    <div style="font-size: 1.5rem; margin-bottom: 20px;">Game Paused</div>
    <div class="btn" id="btn-resume">Back to Game</div>
    <div class="btn" id="btn-quit">Save and Quit to Title</div>
  </div>

  <script>
    // --- Textures & Materials ---
    function genTex(base, variance, type) {
      const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16; const ctx = canvas.getContext('2d');
      for (let x=0; x<16; x++) {
        for (let y=0; y<16; y++) {
          let noise = Math.random() * variance - (variance/2);
          let r = base[0]+noise, g = base[1]+noise, b = base[2]+noise;
          if (type === 'wood' && x % 4 === 0) { r-=20; g-=20; b-=20; }
          if (type === 'leaves' && Math.random() > 0.7) { r=g=b=0; }
          ctx.fillStyle = `rgb(${r}, ${g}, ${b})`; ctx.fillRect(x, y, 1, 1);
        }
      }
      const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
    }

    const mats = {
      grass: new THREE.MeshLambertMaterial({ map: genTex([80, 160, 80], 30) }),
      dirt: new THREE.MeshLambertMaterial({ map: genTex([110, 70, 40], 25) }),
      stone: new THREE.MeshLambertMaterial({ map: genTex([120, 120, 120], 40) }),
      wood: new THREE.MeshLambertMaterial({ map: genTex([90, 60, 30], 20, 'wood') }),
      leaves: new THREE.MeshLambertMaterial({ map: genTex([50, 120, 50], 40, 'leaves'), transparent: true, opacity: 0.9 })
    };
    mats.grass.dur = 0.5; mats.dirt.dur = 0.5; mats.leaves.dur = 0.2; mats.wood.dur = 1.5; mats.stone.dur = 3.0;

    // --- Scene Setup ---
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB); scene.fog = new THREE.Fog(0x87CEEB, 20, 60);
    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false }); renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.8); sunLight.position.set(50, 100, 50); scene.add(sunLight);

    // --- World Gen ---
    let blocks = [], blockMap = new Map(), droppedItems = [];
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    
    function addBlock(x, y, z, mat) {
      const b = new THREE.Mesh(boxGeo, mat); b.position.set(x, y, z); b.material = mat;
      scene.add(b); blocks.push(b); blockMap.set(`${x},${y},${z}`, b);
    }

    function spawnDroppedItem(x, y, z, mat) {
      const itemMesh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.25), mat);
      itemMesh.position.set(x, y, z);
      scene.add(itemMesh);
      droppedItems.push(itemMesh);
    }

    function removeBlock(b) {
      scene.remove(b); blocks.splice(blocks.indexOf(b), 1); blockMap.delete(`${b.position.x},${b.position.y},${b.position.z}`);
      // Drop an item!
      spawnDroppedItem(b.position.x, b.position.y, b.position.z, b.material);
    }

    for (let x = -20; x < 20; x++) {
      for (let z = -20; z < 20; z++) {
        let h = Math.floor(Math.sin(x/8)*2 + Math.cos(z/8)*2);
        for (let y = h-5; y <= h; y++) {
          let mat = mats.stone; if (y === h) mat = mats.grass; else if (y > h - 2) mat = mats.dirt;
          addBlock(x, y, z, mat);
        }
        if (Math.random() < 0.02) {
          for(let ty=1; ty<=4; ty++) addBlock(x, h+ty, z, mats.wood);
          for(let lx=-1; lx<=1; lx++) for(let lz=-1; lz<=1; lz++) for(let ly=3; ly<=5; ly++) 
            if(!blockMap.has(`${x+lx},${h+ly},${z+lz}`)) addBlock(x+lx, h+ly, z+lz, mats.leaves);
        }
      }
    }

    // --- State & UI ---
    let gameState = "MAIN_MENU";
    function setMenu(state) {
      gameState = state;
      document.getElementById('main-menu').style.display = state === "MAIN_MENU" ? 'flex' : 'none';
      document.getElementById('pause-menu').style.display = state === "PAUSED" ? 'flex' : 'none';
      document.getElementById('inventory-screen').style.display = state === "INVENTORY" ? 'flex' : 'none';
      document.getElementById('hud').style.display = state === "PLAYING" ? 'flex' : 'none';
      document.getElementById('crosshair').style.display = state === "PLAYING" ? 'block' : 'none';
      if(state === "PLAYING") document.body.requestPointerLock(); else document.exitPointerLock();
    }

    document.getElementById('btn-singleplayer').onclick = () => { camera.position.set(0, 10, 0); setMenu("PLAYING"); };
    document.getElementById('btn-resume').onclick = () => setMenu("PLAYING");
    document.getElementById('btn-quit').onclick = () => setMenu("MAIN_MENU");

    // --- Controls ---
    const keys = { w: false, a: false, s: false, d: false, space: false, shift: false, ctrl: false };
    document.addEventListener('keydown', (e) => {
      if (e.code === 'KeyE') {
        if (gameState === "PLAYING") { setMenu("INVENTORY"); document.exitPointerLock(); }
        else if (gameState === "INVENTORY") setMenu("PLAYING");
        return;
      }
      if (gameState !== "PLAYING") return;
      if(e.code==='KeyW') keys.w=true; if(e.code==='KeyA') keys.a=true;
      if(e.code==='KeyS') keys.s=true; if(e.code==='KeyD') keys.d=true;
      if(e.code==='Space') keys.space=true; if(e.code==='ShiftLeft') keys.shift=true; if(e.code==='ControlLeft') keys.ctrl=true;
    });
    document.addEventListener('keyup', (e) => {
      if(e.code==='KeyW') keys.w=false; if(e.code==='KeyA') keys.a=false;
      if(e.code==='KeyS') keys.s=false; if(e.code==='KeyD') keys.d=false;
      if(e.code==='Space') keys.space=false; if(e.code==='ShiftLeft') keys.shift=false; if(e.code==='ControlLeft') keys.ctrl=false;
    });

    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    document.addEventListener('mousemove', (e) => {
      if (gameState !== "PLAYING") return;
      euler.setFromQuaternion(camera.quaternion); euler.y -= e.movementX * 0.002; euler.x -= e.movementY * 0.002;
      euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x)); camera.quaternion.setFromEuler(euler);
    });

    document.addEventListener('pointerlockchange', () => { if (document.pointerLockElement !== document.body && gameState === "PLAYING") setMenu("PAUSED"); });

    // --- Mining ---
    const raycaster = new THREE.Raycaster(); const center = new THREE.Vector2(0, 0);
    let isMining = false, mineTimer = 0, targetBlock = null;

    document.addEventListener('mousedown', (e) => {
      if (gameState !== "PLAYING") return;
      raycaster.setFromCamera(center, camera); const hits = raycaster.intersectObjects(blocks);
      if (hits.length > 0 && hits[0].distance < 6) {
        if (e.button === 0) { isMining = true; mineTimer = 0; targetBlock = hits[0].object; document.getElementById('mining-progress').style.display = 'block'; }
        else if (e.button === 2) {
          const pos = new THREE.Vector3().copy(hits[0].point).add(hits[0].face.normal.clone().multiplyScalar(0.5));
          pos.floor().addScalar(0.5);
          if (!blockMap.has(`${pos.x},${pos.y},${pos.z}`)) addBlock(pos.x, pos.y, pos.z, mats.wood); // Placing wood to simulate crafting blocks
        }
      }
    });
    document.addEventListener('mouseup', (e) => { if(e.button === 0) { isMining = false; document.getElementById('mining-progress').style.display = 'none'; targetBlock = null; } });

    // --- Physics ---
    let velocity = new THREE.Vector3(), canJump = false, time = performance.now();
    function checkWall(x, y, z) { let bx = Math.round(x), bz = Math.round(z); return blockMap.has(`${bx},${Math.floor(y)},${bz}`) || blockMap.has(`${bx},${Math.floor(y-1)},${bz}`); }

    function animate() {
      requestAnimationFrame(animate); const now = performance.now(); const delta = Math.min((now - time) / 1000, 0.1); time = now;

      if (gameState === "PLAYING") {
        if (isMining && targetBlock) {
          mineTimer += delta; let maxTime = targetBlock.material.dur;
          document.getElementById('mining-bar').style.width = (mineTimer/maxTime * 100) + '%';
          if (mineTimer >= maxTime) { removeBlock(targetBlock); isMining = false; document.getElementById('mining-progress').style.display = 'none'; }
        }

        // Reduced Speeds to match actual Minecraft
        let speedMult = keys.ctrl ? 22.0 : (keys.shift ? 6.0 : 15.0); 
        velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta; velocity.y -= 30.0 * delta;

        const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
        const right = new THREE.Vector3(); right.crossVectors(camera.up, dir).normalize();

        let mX = 0, mZ = 0;
        if (keys.w) { mX += dir.x * speedMult * delta; mZ += dir.z * speedMult * delta; }
        if (keys.s) { mX -= dir.x * speedMult * delta; mZ -= dir.z * speedMult * delta; }
        if (keys.a) { mX += right.x * speedMult * delta; mZ += right.z * speedMult * delta; }
        if (keys.d) { mX -= right.x * speedMult * delta; mZ -= right.z * speedMult * delta; }

        if(!checkWall(camera.position.x + velocity.x*delta + mX, camera.position.y, camera.position.z)) { velocity.x += mX / delta; camera.position.x += velocity.x * delta; } else velocity.x = 0;
        if(!checkWall(camera.position.x, camera.position.y, camera.position.z + velocity.z*delta + mZ)) { velocity.z += mZ / delta; camera.position.z += velocity.z * delta; } else velocity.z = 0;

        camera.position.y += velocity.y * delta;
        let cOffset = keys.shift ? -0.5 : 0;

        raycaster.set(camera.position, new THREE.Vector3(0, -1, 0)); const floorHits = raycaster.intersectObjects(blocks);
        if (floorHits.length > 0 && floorHits[0].distance < 1.6 - cOffset) { velocity.y = 0; camera.position.y = floorHits[0].point.y + 1.6 + cOffset; canJump = true; } else { canJump = false; }
        if (keys.space && canJump) { velocity.y = 9.0; canJump = false; }

        // Animate Dropped Items and Pickup Logic
        for (let i = droppedItems.length - 1; i >= 0; i--) {
          let item = droppedItems[i];
          item.rotation.y += 2 * delta; // Spin
          item.position.y += Math.sin(now * 0.005) * 0.002; // Bob up and down

          // Check distance to player
          let dist = camera.position.distanceTo(item.position);
          if (dist < 2.0) {
            // Pick up item!
            scene.remove(item);
            droppedItems.splice(i, 1);
          }
        }
      }
      renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
  </script>
</body>
</html>
