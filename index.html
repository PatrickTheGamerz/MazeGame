<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORANGECRAFT V9 - THE GLORY UPDATE</title>
  <style>
    body{margin:0;overflow:hidden;background:#000;font-family:'Courier New',Courier,monospace;user-select:none;color:#fff}
    #crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);pointer-events:none;z-index:100;display:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.9)}
    #crosshair::before{top:9px;left:0;width:20px;height:2px}#crosshair::after{top:0;left:9px;width:2px;height:20px}
    #hud{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;z-index:100;pointer-events:none}
    .stats{display:flex;justify-content:space-between;width:380px;text-shadow:2px 2px 0 #000;margin-bottom:5px;font-size:24px}
    .hearts{color:#ff3333;letter-spacing:2px}.hunger{color:#cc6600;letter-spacing:2px}
    #hotbar-display{display:flex;background:rgba(0,0,0,0.5);border:2px solid #555;padding:2px;margin-bottom:10px}
    .slot{width:36px;height:36px;border:2px solid #888;background:rgba(100,100,100,0.8);margin:0 2px;position:relative;font-size:12px;font-weight:bold;line-height:36px;text-shadow:1px 1px #000;text-align:center}
    .slot.active{border:2px solid #fff;box-shadow:0 0 10px #fff}
    .item-count{position:absolute;bottom:2px;right:4px;line-height:1;font-size:14px;color:#fff}
    #chat-container{position:absolute;bottom:80px;left:20px;width:400px;display:none;flex-direction:column;z-index:150}
    #chat-log{display:flex;flex-direction:column;justify-content:flex-end;height:200px;overflow-y:hidden;margin-bottom:5px;text-shadow:1px 1px 0 #000;pointer-events:none;font-size:18px}
    .chat-msg{background:rgba(0,0,0,0.4);padding:2px 5px;margin-bottom:2px}
    #chat-input{background:rgba(0,0,0,0.6);color:#fff;border:1px solid #555;font-family:inherit;font-size:16px;padding:5px;display:none;width:100%;outline:none}
    .menu-overlay{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(2px);display:none}
    .title{font-size:5rem;color:#FFA500;text-shadow:4px 4px 0 #333;margin-bottom:30px;font-weight:bold;position:relative; font-family: Impact, sans-serif;}
    .splash{position:absolute;top:70px;right:-60px;color:#FF0;font-size:1.5rem;text-shadow:2px 2px 0 #333;transform:rotate(-20deg);animation:pulse 0.5s infinite alternate;white-space:nowrap;}
    @keyframes pulse{from{transform:rotate(-20deg) scale(1)}to{transform:rotate(-20deg) scale(1.1)}}
    .btn{width:300px;padding:12px;margin:6px;background:#777;border:2px solid #000;border-top-color:#aaa;border-left-color:#aaa;color:#fff;font-size:1.2rem;cursor:pointer;text-shadow:2px 2px 0 #333;text-align:center}
    .inv-container{background:#c6c6c6;padding:10px;border:2px solid #000;width:450px;height:350px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:auto}
    .inv-title{color:#333;font-size:14px;margin-bottom:5px;font-weight:bold}
    .inv-top{display:flex;justify-content:space-between;height:150px}
    .inv-main{display:grid;grid-template-columns:repeat(9,36px);gap:4px;justify-content:center;margin-bottom:10px}
    .inv-slot{width:36px;height:36px;background:#8b8b8b;border:2px solid #555;border-top-color:#333;border-left-color:#333;border-bottom-color:#fff;border-right-color:#fff;position:relative;}
    /* Steve CSS Styling */
    .steve-preview{width:100px;height:130px;background:#8b8b8b;border:2px solid #555;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .s-head{width:30px;height:30px;background:#b58165;border-top:8px solid #4d301b;position:relative;z-index:2}
    .s-body{width:30px;height:35px;background:#00aaae;position:relative;z-index:2}
    .s-arm{width:10px;height:35px;background:#b58165;position:absolute;top:38px;border-top:10px solid #00aaae}
    .s-leg{width:14px;height:35px;background:#3131b0;border-bottom:5px solid #606060;margin:0 1px}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="crosshair"></div>
  <div id="hud"><div class="stats"><div class="hearts" id="hp">♥♥♥♥♥♥♥♥♥♥</div><div class="hunger">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div></div><div id="hotbar-display"></div></div>
  <div id="chat-container"><div id="chat-log"></div><input type="text" id="chat-input" autocomplete="off"></div>

  <div id="main-menu" class="menu-overlay" style="display:flex">
    <div class="title">ORANGECRAFT<div class="splash" id="splash-text"></div></div>
    <div class="btn" onclick="setMenu('WORLD_SELECT')">Singleplayer</div>
    <div class="btn disabled">Multiplayer</div><div class="btn disabled">Options</div>
  </div>

  <div id="pause-menu" class="menu-overlay">
    <div style="font-size:1.5rem;margin-bottom:20px">Game Menu</div>
    <div class="btn" onclick="setMenu('PLAYING')">Back to Game</div>
    <div class="btn" onclick="setMenu('MAIN_MENU')">Save and Quit to Title</div>
  </div>

  <div id="inventory-screen" class="menu-overlay">
    <div class="inv-container">
      <div class="inv-top">
        <div style="display:flex;flex-direction:column;gap:4px"><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div></div>
        <div class="steve-preview">
           <div class="s-head"></div><div class="s-body"></div>
           <div class="s-arm" style="left:20px"></div><div class="s-arm" style="right:20px"></div>
           <div style="display:flex"><div class="s-leg"></div><div class="s-leg"></div></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center">
          <div class="inv-title">Crafting</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px"><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div></div>
        </div>
      </div>
      <div>
        <div class="inv-title">Inventory</div>
        <div class="inv-main" id="main-inv-grid"></div>
        <div class="inv-main" id="hotbar-inv-grid" style="margin-top:10px"></div>
      </div>
    </div>
  </div>

  <script>
    // --- Data Management ---
    // 0-8 is Hotbar, 9-35 is Main Inventory
    let inventoryData = Array(36).fill().map(() => ({type: null, count: 0}));
    let activeSlot = 0;

    const splashes = ["Snaps to grid!", "Inventory linked!", "Slow and steady!", "Steve is here!", "Orange is the new Block!"];
    document.getElementById('splash-text').innerText = splashes[Math.floor(Math.random()*splashes.length)];

    // --- Texture & Materials (Keep original logic) ---
    function gT(b,v,t){
      let c=document.createElement('canvas');c.width=16;c.height=16;let x=c.getContext('2d');
      for(let i=0;i<16;i++)for(let j=0;j<16;j++){
        let n=Math.random()*v-(v/2),r=b[0]+n,g=b[1]+n,bl=b[2]+n;
        if(t==='wS'&&i%4===0){r-=20;g-=20;bl-=20}
        if(t==='wT'){ let d=Math.sqrt((i-8)**2+(j-8)**2); r=150-d*5; g=100-d*3; bl=50; if(Math.round(d)%3===0){r-=20;g-=20;bl-=10;} }
        if(t==='l'&&Math.random()>.7)r=g=bl=0; if(t==='b')r=g=bl=Math.random()*40+10;
        x.fillStyle=`rgb(${r},${g},${bl})`;x.fillRect(i,j,1,1);
      }
      let tx=new THREE.CanvasTexture(c);tx.magFilter=THREE.NearestFilter;return {m:tx,c:`rgb(${b[0]},${b[1]},${b[2]})`};
    }
    const tG=gT([80,160,80],30), tD=gT([110,70,40],25), tS=gT([120,120,120],40), tWs=gT([70,40,20],20,'wS'), tWt=gT([150,100,50],0,'wT'), tL=gT([50,120,50],40,'l'), tB=gT([20,20,20],0,'b');
    const mt={
      grass:new THREE.MeshLambertMaterial({map:tG.m,name:'grass'}), dirt:new THREE.MeshLambertMaterial({map:tD.m,name:'dirt'}),
      stone:new THREE.MeshLambertMaterial({map:tS.m,name:'stone'}), wood:new THREE.MeshLambertMaterial({map:tWs.m,name:'wood'}),
      leaves:new THREE.MeshLambertMaterial({map:tL.m,transparent:true,opacity:0.9,name:'leaves'}), bedrock:new THREE.MeshLambertMaterial({map:tB.m,name:'bedrock'})
    };
    const uiC={grass:tG.c,dirt:tD.c,stone:tS.c,wood:tWs.c,leaves:tL.c,bedrock:tB.c};

    // --- Scene Setup ---
    const sc=new THREE.Scene();sc.background=new THREE.Color(0x87CEEB);
    const cam=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
    const rnd=new THREE.WebGLRenderer({antialias:false});rnd.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(rnd.domElement);
    const amb=new THREE.AmbientLight(0xffffff,0.6);sc.add(amb);
    
    let blks=[], bMap=new Map();
    function addB(x,y,z,m){
      let b=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),m);
      b.position.set(x,y,z); sc.add(b); blks.push(b); bMap.set(`${x},${y},${z}`,b);
    }

    // World Gen
    for(let x=-15;x<15;x++)for(let z=-15;z<15;z++){
      let h=Math.floor(Math.sin(x/8)*2+Math.cos(z/8)*2);
      addB(x,h,z,mt.grass); addB(x,h-1,z,mt.dirt);
    }

    // --- Inventory System Logic ---
    function updateUI(){
      const hotbarDisp = document.getElementById('hotbar-display');
      const hotbarInv = document.getElementById('hotbar-inv-grid');
      const mainInv = document.getElementById('main-inv-grid');
      
      hotbarDisp.innerHTML = ''; hotbarInv.innerHTML = ''; mainInv.innerHTML = '';

      for(let i=0; i<36; i++){
        let item = inventoryData[i];
        let slotHTML = `<div class="inv-slot" style="background:${item.type?uiC[item.type]:''}">${item.count>0?`<span class="item-count">${item.count}</span>`:''}</div>`;
        
        if(i < 9) { // Hotbar
           hotbarInv.innerHTML += slotHTML;
           let d = document.createElement('div');
           d.className = 'slot' + (i === activeSlot ? ' active' : '');
           if(item.type) { d.style.background = uiC[item.type]; d.innerHTML = `<span class="item-count">${item.count}</span>`; }
           hotbarDisp.appendChild(d);
        } else { // Main Inventory
           mainInv.innerHTML += slotHTML;
        }
      }
    }

    function pickUp(type){
      // Try to stack in existing slots first (0-35)
      for(let i=0; i<36; i++){
        if(inventoryData[i].type === type && inventoryData[i].count < 64){
          inventoryData[i].count++; updateUI(); return;
        }
      }
      // Find first empty slot
      for(let i=0; i<36; i++){
        if(!inventoryData[i].type){
          inventoryData[i].type = type; inventoryData[i].count = 1; updateUI(); return;
        }
      }
    }

    // --- Menu Control ---
    let gameState = "MAIN_MENU";
    function setMenu(s){
      gameState = s;
      document.getElementById('main-menu').style.display = s==="MAIN_MENU"?'flex':'none';
      document.getElementById('pause-menu').style.display = s==="PAUSE_MENU"?'flex':'none';
      document.getElementById('inventory-screen').style.display = s==="INV"?'flex':'none';
      document.getElementById('hud').style.display = s==="PLAYING"?'flex':'none';
      document.getElementById('crosshair').style.display = s==="PLAYING"?'block':'none';
      if(s==="PLAYING") document.body.requestPointerLock();
      else document.exitPointerLock();
    }

    // --- Interaction & Grid Snapping ---
    const ray = new THREE.Raycaster();
    document.addEventListener('mousedown', e => {
      if(gameState !== "PLAYING") return;
      ray.setFromCamera(new THREE.Vector2(0,0), cam);
      let intersects = ray.intersectObjects(blks);
      if(intersects.length > 0 && intersects[0].distance < 5){
        let b = intersects[0].object;
        if(e.button === 0){ // Break
          sc.remove(b); blks.splice(blks.indexOf(b),1); bMap.delete(`${b.position.x},${b.position.y},${b.position.z}`);
          pickUp(b.material.name || 'grass');
        } else if(e.button === 2){ // Place
          let item = inventoryData[activeSlot];
          if(item.type && item.count > 0){
            // GRID SNAPPING LOGIC
            // Get normal of face clicked, add it to current block position
            let pos = b.position.clone().add(intersects[0].face.normal);
            if(!bMap.has(`${pos.x},${pos.y},${pos.z}`)){
              addB(pos.x, pos.y, pos.z, mt[item.type]);
              item.count--; if(item.count === 0) item.type = null;
              updateUI();
            }
          }
        }
      }
    });

    // --- Input & Movement ---
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if(e.code === 'KeyE') gameState === "PLAYING" ? setMenu("INV") : setMenu("PLAYING");
      if(e.code === 'Escape' && gameState === "PLAYING") setMenu("PAUSE_MENU");
      if(e.key >= '1' && e.key <= '9') { activeSlot = parseInt(e.key)-1; updateUI(); }
    });
    document.addEventListener('keyup', e => keys[e.code] = false);

    document.addEventListener('mousemove', e => {
      if(gameState !== "PLAYING") return;
      cam.rotation.y -= e.movementX * 0.002;
      cam.rotation.x -= e.movementY * 0.002;
      cam.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, cam.rotation.x));
    });
    cam.rotation.order = "YXZ";

    // --- Game Loop ---
    let vel = new THREE.Vector3();
    function animate(){
      requestAnimationFrame(animate);
      if(gameState === "PLAYING"){
        let speed = 0.1; // "Minecraft Normal" Speed
        let dir = new THREE.Vector3(); cam.getWorldDirection(dir); dir.y = 0; dir.normalize();
        let side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();
        
        if(keys['KeyW']) cam.position.addScaledVector(dir, speed);
        if(keys['KeyS']) cam.position.addScaledVector(dir, -speed);
        if(keys['KeyA']) cam.position.addScaledVector(side, speed);
        if(keys['KeyD']) cam.position.addScaledVector(side, -speed);
        
        // Simple gravity
        cam.position.y -= 0.1;
        let ground = Math.floor(cam.position.y - 1.6);
        if(bMap.has(`${Math.round(cam.position.x)},${ground},${Math.round(cam.position.z)}`)){
          cam.position.y = ground + 2.6;
        }
      } else if(gameState === "MAIN_MENU") {
        cam.rotation.y += 0.002; // Title screen pan
      }
      rnd.render(sc, cam);
    }

    // Initialization
    cam.position.set(0, 5, 0);
    updateUI();
    animate();
  </script>
</body>
</html>
