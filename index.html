<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bad Time</title>
<style>
body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace;color:#fff}
canvas{border:2px solid #333;box-shadow:0 0 20px rgba(255,255,255,0.1)}
</style>
</head>
<body>
<canvas id="game" width="640" height="480"></canvas>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
let state='menu',btn=0,hp=92,mHp=92,f=0,atkP=0,k={};
let p={x:312,y:312,s:16,c:'#f00',spd:4};
let box={x:32,y:240,w:576,h:140};
let bns=[],parts=[];
window.addEventListener('keydown',e=>k[e.key]=1);
window.addEventListener('keyup',e=>k[e.key]=0);
function r(x,y,w,h,cl){ctx.fillStyle=cl;ctx.fillRect(x,y,w,h);}
function tx(t,x,y,s,cl){ctx.fillStyle=cl;ctx.font=s+'px monospace';ctx.fillText(t,x,y);}
function rs(){p.x=312;p.y=290;bns=[];f=0;box={x:150,y:230,w:340,h:180};}
function up(){
if(hp<=0)return;
if(state==='menu'){
box={x:32,y:240,w:576,h:140};
if(k['ArrowLeft']&&f>10){btn=Math.max(0,btn-1);f=0;}
if(k['ArrowRight']&&f>10){btn=Math.min(3,btn+1);f=0;}
if((k['Enter']||k['z'])&&f>10){state='atk';rs();f=0;atkP++;}
}else if(state==='atk'){
if(k['ArrowLeft'])p.x-=p.spd;if(k['ArrowRight'])p.x+=p.spd;
if(k['ArrowUp'])p.y-=p.spd;if(k['ArrowDown'])p.y+=p.spd;
p.x=Math.max(box.x+4,Math.min(box.x+box.w-p.s-4,p.x));
p.y=Math.max(box.y+4,Math.min(box.y+box.h-p.s-4,p.y));
if(f%25===0){
let isTop=Math.random()>0.5;
bns.push({x:500,y:isTop?box.y+4:box.y+box.h-64,w:16,h:60,vx:-6});
}
for(let i=bns.length-1;i>=0;i--){
let b=bns[i];b.x+=b.vx;
if(p.x<b.x+b.w&&p.x+p.s>b.x&&p.y<b.y+b.h&&p.y+p.s>b.y){
hp--;p.c='white';setTimeout(()=>p.c='#f00',50);
}
if(b.x<box.x)bns.splice(i,1);
}
if(f>300){state='menu';f=0;p.x=48+btn*155;p.y=442;}
}
f++;
}
function dr(){
r(0,0,640,480,'#000');
if(hp<=0){tx('GAME OVER',220,240,40,'#fff');return;}
tx('SANS',280,100,30,'#fff');
tx('Lv 19',120,410,20,'#fff');
tx('HP',240,410,20,'#fff');
r(280,395,mHp*1.5,20,'#f00');
r(280,395,hp*1.5,20,'#ff0');
tx(hp+' / '+mHp,430,410,20,'#fff');
ctx.strokeStyle='#fff';ctx.lineWidth=4;
ctx.strokeRect(box.x,box.y,box.w,box.h);
let bs=['FIGHT','ACT','ITEM','MERCY'];
for(let i=0;i<4;i++){
let x=32+i*155,y=430,w=110,h=40;
r(x,y,w,h,state==='menu'&&btn===i?'#fff':'#000');
ctx.strokeStyle=state==='menu'&&btn===i?'#ff9900':'#ff9900';
ctx.strokeRect(x,y,w,h);
tx(bs[i],x+30,y+26,18,state==='menu'&&btn===i?'#000':'#ff9900');
}
if(state==='menu'){
tx('* It\'s a beautiful day outside.',50,280,20,'#fff');
tx('* Birds are singing, flowers are blooming.',50,310,20,'#fff');
r(48+btn*155,442,12,12,'#f00');
}else if(state==='atk'){
r(p.x,p.y,p.s,p.s,p.c);
bns.forEach(b=>r(b.x,b.y,b.w,b.h,'#fff'));
}
}
setInterval(()=>{up();dr();},1000/60);
</script>
</body>
</html>
