<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORANGECRAFT Alpha 1.1</title>
  <style>
    body{margin:0;overflow:hidden;background:#000;font-family:'Courier New',Courier,monospace;user-select:none;color:#fff}
    /* VHS Overlay Effect */
    #vhs-filter {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 500;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 3px, 3px 100%;
      opacity: 0.6;
    }
    #vhs-noise {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 501;
      background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/White_noise.png');
      opacity: 0.05;
      animation: noise 0.2s infinite;
    }
    @keyframes noise { 0% { transform: translate(0,0) } 50% { transform: translate(-5%,-5%) } 100% { transform: translate(5%,5%) } }

    #crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);pointer-events:none;z-index:100;display:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.8)}
    #crosshair::before{top:9px;left:0;width:20px;height:2px}#crosshair::after{top:0;left:9px;width:2px;height:20px}
    #hud{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;z-index:100;pointer-events:none}
    #hotbar-display{display:flex;background:rgba(0,0,0,0.5);border:2px solid #555;padding:2px;margin-bottom:10px}
    .slot{width:36px;height:36px;border:2px solid #888;background:rgba(100,100,100,0.8);margin:0 2px;position:relative;text-align:center;line-height:36px}
    .slot.active{border:2px solid #fff;box-shadow:0 0 10px #fff}
    .item-count{position:absolute;bottom:2px;right:4px;font-size:12px;text-shadow:1px 1px #000}
    
    .menu-overlay{position:absolute;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.75);z-index:200}
    .title{font-size:4rem;color:#FFA500;text-shadow:4px 4px 0 #333;margin-bottom:20px;font-weight:bold;font-family: Impact;position:relative}
    .version-tag{position:absolute;bottom:10px;left:10px;font-size:14px;color:#aaa}
    .btn{width:310px;padding:12px;margin:6px;background:#777;border:2px solid #000;border-top-color:#aaa;border-left-color:#aaa;color:#fff;cursor:pointer;text-align:center}
    .btn:hover{background:#888}

    /* Inventory & Crafting Table UI */
    .inv-container{background:#c6c6c6;padding:15px;border:3px solid #000;display:flex;flex-direction:column;pointer-events:auto;color:#000}
    .inv-slot{width:36px;height:36px;background:#8b8b8b;border:2px solid #555;border-top-color:#333;border-left-color:#333;border-bottom-color:#fff;border-right-color:#fff;position:relative;cursor:pointer}
    .inv-main{display:grid;grid-template-columns:repeat(9,36px);gap:4px;justify-content:center;margin-top:10px}
    #drag-icon{position:fixed;pointer-events:none;z-index:600;width:36px;height:36px;display:none;border:1px solid #fff}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="vhs-filter"></div><div id="vhs-noise"></div>
  <div id="crosshair"></div>
  <div id="drag-icon"></div>
  <div id="hud"><div id="hotbar-display"></div></div>
  <div class="version-tag">Alpha 1.1</div>

  <div id="main-menu" class="menu-overlay" style="display:flex">
    <div class="title">ORANGECRAFT</div>
    <div class="btn" onclick="startGame()">Singleplayer</div>
    <div class="btn" onclick="location.reload()">Reset World</div>
  </div>

  <div id="inventory-screen" class="menu-overlay">
    <div class="inv-container" id="inv-cont">
      <div id="inv-header" style="display:flex; justify-content:space-between; margin-bottom:10px">
        <div style="width:100px; height:120px; background:#444; border:2px solid #000"></div>
        <div id="player-craft-area">
          <div style="font-size:12px">Crafting</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:2px" id="p-craft-grid">
            <div class="inv-slot" data-slot="pc0"></div><div class="inv-slot" data-slot="pc1"></div>
            <div class="inv-slot" data-slot="pc2"></div><div class="inv-slot" data-slot="pc3"></div>
          </div>
        </div>
      </div>
      <div class="inv-main" id="main-inv"></div>
      <div class="inv-main" id="hot-inv"></div>
    </div>
  </div>

  <div id="table-screen" class="menu-overlay">
    <div class="inv-container">
      <div style="text-align:center; font-weight:bold; margin-bottom:5px">Crafting Table</div>
      <div style="display:flex; align-items:center; gap:20px">
        <div style="display:grid; grid-template-columns:repeat(3, 36px); gap:2px" id="table-grid">
          <div class="inv-slot" data-slot="t0"></div><div class="inv-slot" data-slot="t1"></div><div class="inv-slot" data-slot="t2"></div>
          <div class="inv-slot" data-slot="t3"></div><div class="inv-slot" data-slot="t4"></div><div class="inv-slot" data-slot="t5"></div>
          <div class="inv-slot" data-slot="t6"></div><div class="inv-slot" data-slot="t7"></div><div class="inv-slot" data-slot="t8"></div>
        </div>
        <div style="font-size:30px">→</div>
        <div class="inv-slot" id="table-output"></div>
      </div>
      <div class="inv-main" id="table-main-inv"></div>
      <div class="inv-main" id="table-hot-inv"></div>
      <div class="btn" style="width:100%; margin-top:10px; padding:5px" onclick="setMenu('PLAYING')">Close</div>
    </div>
  </div>

  <script>
    // --- 1. SETUP ---
    const sc = new THREE.Scene();
    sc.fog = new THREE.FogExp2(0x87CEEB, 0.08); // Alpha Thick Fog
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const rnd = new THREE.WebGLRenderer({antialias:false});
    rnd.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(rnd.domElement);

    const amb = new THREE.AmbientLight(0xffffff, 0.6); sc.add(amb);
    const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(10, 20, 10); sc.add(sun);

    // --- 2. TEXTURES & BLOCKS ---
    const loader = new THREE.TextureLoader();
    function createAlphaTex(color) {
      let c = document.createElement('canvas'); c.width=16; c.height=16; let x=c.getContext('2d');
      x.fillStyle=color; x.fillRect(0,0,16,16);
      for(let i=0;i<20;i++){ x.fillStyle='rgba(0,0,0,0.1)'; x.fillRect(Math.random()*16,Math.random()*16,1,1); }
      let t = new THREE.CanvasTexture(c); t.magFilter = THREE.NearestFilter; return t;
    }

    const tex = {
      grass: createAlphaTex('#7cfc00'), dirt: createAlphaTex('#866043'), stone: createAlphaTex('#7a7a7a'),
      logSide: createAlphaTex('#674e37'), logTop: createAlphaTex('#d2b48c'), // Log Top = Inside wood
      planks: createAlphaTex('#9a7f59'), bedrock: createAlphaTex('#222')
    };

    const mats = {
      grass: new THREE.MeshLambertMaterial({map: tex.grass}),
      dirt: new THREE.MeshLambertMaterial({map: tex.dirt}),
      stone: new THREE.MeshLambertMaterial({map: tex.stone}),
      bedrock: new THREE.MeshLambertMaterial({map: tex.bedrock}),
      planks: new THREE.MeshLambertMaterial({map: tex.planks}),
      log: [mats.logSide, mats.logSide, mats.logTop, mats.logTop, mats.logSide, mats.logSide] // Multi-mat
    };
    // Re-declare log material properly
    const logSideMat = new THREE.MeshLambertMaterial({map: tex.logSide});
    const logTopMat = new THREE.MeshLambertMaterial({map: tex.logTop});
    const logMats = [logSideMat, logSideMat, logTopMat, logTopMat, logSideMat, logSideMat];

    let blks = [], bMap = new Map();
    function addB(x,y,z,mat, name){
      let b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
      b.position.set(x,y,z); b.name = name;
      sc.add(b); blks.push(b); bMap.set(`${x},${y},${z}`, b);
    }

    // World Gen
    for(let x=-10; x<10; x++) for(let z=-10; z<10; z++){
      addB(x, -5, z, mats.bedrock, 'bedrock'); // Bedrock floor
      addB(x, 0, z, mats.grass, 'grass');
      addB(x, -1, z, mats.dirt, 'dirt');
      if(Math.random() < 0.02) addB(x, 1, z, logMats, 'log'); // Alpha trees
    }

    // --- 3. INVENTORY & CRAFTING ---
    let inventory = Array(36).fill(null).map(()=>({type:null, count:0}));
    let activeSlot = 0;
    let gameState = "MAIN_MENU";

    function updateUI(){
      const hDisp = document.getElementById('hotbar-display');
      hDisp.innerHTML = '';
      inventory.slice(0,9).forEach((item, i)=>{
        let s = document.createElement('div'); s.className = 'slot' + (i===activeSlot?' active':'');
        if(item.type) { s.style.background = '#8b8b8b'; s.innerHTML = `<span class="item-count">${item.count}</span>`; }
        hDisp.appendChild(s);
      });
    }

    function startGame(){ cam.position.set(0, 2, 5); setMenu('PLAYING'); }

    function setMenu(s){
      gameState = s;
      document.querySelectorAll('.menu-overlay').forEach(m=>m.style.display='none');
      document.getElementById('hud').style.display = s==="PLAYING"?'flex':'none';
      document.getElementById('crosshair').style.display = s==="PLAYING"?'block':'none';
      if(s==="PLAYING") document.body.requestPointerLock();
      else { 
        document.exitPointerLock(); 
        if(s!=="MAIN_MENU") document.getElementById(s.toLowerCase().replace('_','-') + '-screen').style.display='flex';
      }
      updateUI();
    }

    // Interaction
    document.addEventListener('mousedown', e=>{
      if(gameState !== "PLAYING") return;
      const ray = new THREE.Raycaster();
      ray.setFromCamera(new THREE.Vector2(0,0), cam);
      let hits = ray.intersectObjects(blks);
      if(hits.length > 0 && hits[0].distance < 5){
        let b = hits[0].object;
        if(e.button === 0 && b.name !== 'bedrock'){ // Break
          sc.remove(b); bMap.delete(`${b.position.x},${b.position.y},${b.position.z}`);
          blks.splice(blks.indexOf(b),1);
        } else if(e.button === 2){ // Place or Use
           // If right click log, place plank for now
           let p = b.position.clone().add(hits[0].face.normal);
           addB(p.x, p.y, p.z, mats.planks, 'planks');
        }
      }
    });

    // --- 4. LOOP ---
    function animate() {
      requestAnimationFrame(animate);
      if(gameState === "PLAYING"){
        // Basic Alpha movement
        if(cam.position.y < 1.6) cam.position.y = 1.6;
      }
      rnd.render(sc, cam);
    }

    document.addEventListener('keydown', e=>{
      if(e.code === 'KeyE') setMenu(gameState==="INV"?"PLAYING":"INV");
      if(e.code === 'Escape') setMenu("MAIN_MENU");
    });

    updateUI();
    animate();
  </script>
</body>
</html>
