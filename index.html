<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browser Voxel Builder - V2</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #87CEEB;
      font-family: 'Courier New', Courier, monospace; /* Minecraft-ish font */
      user-select: none;
    }
    
    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 100;
      display: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
    }
    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    
    /* Main Menu UI */
    #main-menu {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Dirt_block.png/240px-Dirt_block.png');
      background-size: 100px 100px;
      background-color: #555;
      background-blend-mode: multiply;
      z-index: 200;
    }
    
    .title {
      font-size: 4rem;
      color: #fff;
      text-shadow: 4px 4px 0px #000;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .btn {
      width: 400px;
      padding: 15px;
      margin: 5px;
      background-color: #777;
      border: 2px solid #000;
      border-top-color: #aaa;
      border-left-color: #aaa;
      color: white;
      font-size: 1.2rem;
      font-family: inherit;
      text-align: center;
      cursor: pointer;
      text-shadow: 2px 2px 0px #333;
    }
    .btn:hover { background-color: #999; }
    .btn:active {
      border-top-color: #000;
      border-left-color: #000;
      border-bottom-color: #aaa;
      border-right-color: #aaa;
    }
    .disabled { color: #aaa; cursor: not-allowed; }
    .disabled:hover { background-color: #777; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="crosshair"></div>
  
  <div id="main-menu">
    <div class="title">VOXELCRAFT</div>
    <div class="btn" id="btn-singleplayer">Singleplayer</div>
    <div class="btn disabled">Multiplayer (Requires Server)</div>
    <div class="btn disabled">Options</div>
  </div>

  <script>
    // --- 1. Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky color
    scene.fog = new THREE.Fog(0x87CEEB, 20, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false }); // Pixelated look
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 2. Lighting ---
    const ambientLight = new THREE.AmbientLight(0xcccccc, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(20, 50, 20);
    scene.add(dirLight);

    // --- 3. Materials (Colors simulating blocks) ---
    const grassMat = new THREE.MeshLambertMaterial({ color: 0x55aa55 });
    const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    const stoneMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    
    const blocks = []; // To store physics/raycasting objects

    // --- 4. Hilly Terrain Generation ---
    const chunkSize = 30;
    for (let x = -chunkSize/2; x < chunkSize/2; x++) {
      for (let z = -chunkSize/2; z < chunkSize/2; z++) {
        // Using basic math to simulate rolling hills (instead of complex noise libraries)
        let height = Math.floor(Math.sin(x / 6) * 3 + Math.cos(z / 5) * 3);
        
        // Build a column of blocks
        for (let y = height - 4; y <= height; y++) {
          let material = stoneMat; // Bottom is stone
          if (y === height) material = grassMat; // Top is grass
          else if (y > height - 3) material = dirtMat; // Middle is dirt

          const block = new THREE.Mesh(boxGeo, material);
          block.position.set(x, y, z);
          scene.add(block);
          blocks.push(block);
        }
      }
    }

    // --- 5. Custom First-Person Controls ---
    let isLocked = false;
    const menu = document.getElementById('main-menu');
    const crosshair = document.getElementById('crosshair');

    // Clicking Singleplayer locks the mouse to the game
    document.getElementById('btn-singleplayer').addEventListener('click', () => {
      document.body.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement === document.body) {
        isLocked = true;
        menu.style.display = 'none';
        crosshair.style.display = 'block';
      } else {
        isLocked = false;
        menu.style.display = 'flex';
        crosshair.style.display = 'none';
      }
    });

    // Mouse Look
    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    document.addEventListener('mousemove', (event) => {
      if (!isLocked) return;
      euler.setFromQuaternion(camera.quaternion);
      euler.y -= event.movementX * 0.002;
      euler.x -= event.movementY * 0.002;
      euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x)); // Prevent looking past straight up/down
      camera.quaternion.setFromEuler(euler);
    });

    // Keyboard Movement
    const keys = { w: false, a: false, s: false, d: false, space: false };
    document.addEventListener('keydown', (e) => {
      if(e.code === 'KeyW') keys.w = true;
      if(e.code === 'KeyA') keys.a = true;
      if(e.code === 'KeyS') keys.s = true;
      if(e.code === 'KeyD') keys.d = true;
      if(e.code === 'Space') keys.space = true;
    });
    document.addEventListener('keyup', (e) => {
      if(e.code === 'KeyW') keys.w = false;
      if(e.code === 'KeyA') keys.a = false;
      if(e.code === 'KeyS') keys.s = false;
      if(e.code === 'KeyD') keys.d = false;
      if(e.code === 'Space') keys.space = false;
    });

    // --- 6. Placing & Breaking Blocks ---
    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);

    document.addEventListener('mousedown', (event) => {
      if (!isLocked) return;
      raycaster.setFromCamera(center, camera);
      const intersects = raycaster.intersectObjects(blocks);

      if (intersects.length > 0 && intersects[0].distance < 6) {
        if (event.button === 0) { 
          // Left Click: Break
          scene.remove(intersects[0].object);
          blocks.splice(blocks.indexOf(intersects[0].object), 1);
        } else if (event.button === 2) { 
          // Right Click: Place Stone
          const block = new THREE.Mesh(boxGeo, stoneMat);
          block.position.copy(intersects[0].point).add(intersects[0].face.normal);
          block.position.floor().addScalar(0.5);
          scene.add(block);
          blocks.push(block);
        }
      }
    });

    // --- 7. Physics & Game Loop ---
    camera.position.set(0, 10, 0);
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let canJump = false;
    let prevTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now();
      const delta = (time - prevTime) / 1000;

      if (isLocked) {
        // Gravity & Friction
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;
        velocity.y -= 25.0 * delta; // Gravity force

        direction.z = Number(keys.w) - Number(keys.s);
        direction.x = Number(keys.d) - Number(keys.a);
        direction.normalize();

        // Apply movement relative to where we are looking
        const speed = 40.0;
        if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
        if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;

        camera.translateZ(velocity.z * delta);
        camera.translateX(velocity.x * delta);
        camera.position.y += velocity.y * delta;

        // Jump
        if (keys.space && canJump) {
          velocity.y = 10.0;
          canJump = false;
        }

        // --- Crude Collision Detection ---
        // We cast a ray straight down from the camera to see if we hit the ground
        raycaster.set(camera.position, new THREE.Vector3(0, -1, 0));
        const floorIntersects = raycaster.intersectObjects(blocks);
        
        if (floorIntersects.length > 0 && floorIntersects[0].distance < 1.5) {
          // Hit the ground
          velocity.y = Math.max(0, velocity.y); // Stop falling
          camera.position.y = floorIntersects[0].point.y + 1.5; // Keep player head above ground
          canJump = true;
        } else {
          canJump = false; // We are in the air
        }
      }

      prevTime = time;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
