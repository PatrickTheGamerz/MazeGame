<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORANGECRAFT V8 - FINAL OVERHAUL</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; color: white; }
    
    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); }
    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    
    /* HUD */
    #hud { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: none; flex-direction: column; align-items: center; z-index: 100; pointer-events: none;}
    .stats { display: flex; justify-content: space-between; width: 380px; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; font-size: 24px; }
    .hearts { color: #ff3333; letter-spacing: 2px; } .hunger { color: #cc6600; letter-spacing: 2px; }
    
    #hotbar { display: flex; background: rgba(0,0,0,0.5); border: 2px solid #555; padding: 2px; margin-bottom: 10px; }
    .slot { width: 36px; height: 36px; border: 2px solid #888; background: rgba(100,100,100,0.8); margin: 0 2px; position: relative; font-size: 10px; text-align: center; line-height: 36px; text-shadow: 1px 1px #000;}
    .slot.active { border: 2px solid #fff; box-shadow: 0 0 10px #fff; }
    .slot img { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; top:0; left:0; z-index: -1; opacity: 0.8;}
    .item-count { position: absolute; bottom: 2px; right: 4px; font-size: 12px; font-weight: bold; line-height: 1; }

    /* Menus */
    .menu-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); z-index: 200; backdrop-filter: blur(2px); }
    #pause-menu { display: none; }
    .title { font-size: 5rem; color: #FFA500; text-shadow: 4px 4px 0px #333; margin-bottom: 30px; font-weight: bold; }
    .btn { width: 300px; padding: 12px; margin: 6px; background-color: #777; border: 2px solid #000; border-top-color: #aaa; border-left-color: #aaa; color: white; font-size: 1.2rem; cursor: pointer; text-shadow: 2px 2px 0px #333; text-align: center; }
    .btn:hover { background-color: #888; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  
  <div id="crosshair"></div>
  
  <div id="hud">
    <div class="stats"><div class="hearts">♥♥♥♥♥♥♥♥♥♥</div><div class="hunger">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div></div>
    <div id="hotbar" class="hotbar-ui">
      </div>
  </div>

  <div id="main-menu" class="menu-overlay">
    <div class="title">ORANGECRAFT</div>
    <div class="btn" id="btn-play">Play Game</div>
  </div>

  <div id="pause-menu" class="menu-overlay">
    <div style="font-size: 1.5rem; margin-bottom: 20px;">Game Paused</div>
    <div class="btn" id="btn-resume">Back to Game</div>
  </div>

  <script>
    // --- Textures & Materials ---
    function genTex(base, variance, type) {
      const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16; const ctx = canvas.getContext('2d');
      for (let x=0; x<16; x++) for (let y=0; y<16; y++) {
        let n = Math.random() * variance - (variance/2); let r = base[0]+n, g = base[1]+n, b = base[2]+n;
        if (type === 'wood' && x % 4 === 0) { r-=20; g-=20; b-=20; }
        if (type === 'leaves' && Math.random() > 0.7) r=g=b=0;
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`; ctx.fillRect(x, y, 1, 1);
      }
      const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; 
      return { map: tex, colorStr: `rgb(${base[0]},${base[1]},${base[2]})` }; // Save color for UI
    }

    const tDirt = genTex([110, 70, 40], 25), tStone = genTex([120, 120, 120], 40), tWood = genTex([90, 60, 30], 20, 'wood'), tLeaves = genTex([50, 120, 50], 40, 'leaves');
    const mats = {
      dirt: new THREE.MeshLambertMaterial({ map: tDirt.map, name: 'dirt' }),
      stone: new THREE.MeshLambertMaterial({ map: tStone.map, name: 'stone' }),
      wood: new THREE.MeshLambertMaterial({ map: tWood.map, name: 'wood' }),
      leaves: new THREE.MeshLambertMaterial({ map: tLeaves.map, transparent: true, opacity: 0.9, name: 'leaves' })
    };
    const uiColors = { dirt: tDirt.colorStr, stone: tStone.colorStr, wood: tWood.colorStr, leaves: tLeaves.colorStr };

    // --- Scene Setup (Sky is Back!) ---
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB); scene.fog = new THREE.Fog(0x87CEEB, 15, 50);
    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false }); renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); scene.add(ambientLight);
    const skyPivot = new THREE.Object3D(); scene.add(skyPivot);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.8); sunLight.position.set(0, 100, 0); skyPivot.add(sunLight);
    const sunMesh = new THREE.Mesh(new THREE.BoxGeometry(10,10,10), new THREE.MeshBasicMaterial({color: 0xffffaa})); sunMesh.position.set(0,100,0); skyPivot.add(sunMesh);
    
    const clouds = []; const cMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
    for(let i=0; i<10; i++) { let c = new THREE.Mesh(new THREE.BoxGeometry(8,2,12), cMat); c.position.set(Math.random()*60-30, 40, Math.random()*60-30); scene.add(c); clouds.push(c); }

    // --- Hotbar Inventory System ---
    let inventory = [
      { type: 'stone', count: 64 }, { type: 'wood', count: 12 }, { type: null, count: 0 },
      { type: null, count: 0 }, { type: null, count: 0 }, { type: null, count: 0 },
      { type: null, count: 0 }, { type: null, count: 0 }, { type: null, count: 0 }
    ];
    let activeSlot = 0;
    const hotbarEl = document.getElementById('hotbar');

    function renderHotbar() {
      hotbarEl.innerHTML = '';
      for(let i=0; i<9; i++) {
        let div = document.createElement('div');
        div.className = 'slot' + (i === activeSlot ? ' active' : '');
        if(inventory[i].type) {
          div.style.backgroundColor = uiColors[inventory[i].type];
          div.innerHTML = `<span class="item-count">${inventory[i].count}</span>`;
        }
        hotbarEl.appendChild(div);
      }
    }
    renderHotbar();

    function pickupItem(type) {
      // Find existing stack
      for(let i=0; i<9; i++) if(inventory[i].type === type && inventory[i].count < 64) { inventory[i].count++; renderHotbar(); return; }
      // Find empty slot
      for(let i=0; i<9; i++) if(!inventory[i].type) { inventory[i].type = type; inventory[i].count = 1; renderHotbar(); return; }
    }

    // --- World & Physics Objects ---
    let blocks = [], blockMap = new Map(), drops = [];
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    
    function addBlock(x, y, z, mat) {
      const b = new THREE.Mesh(boxGeo, mat); b.position.set(x, y, z); scene.add(b); blocks.push(b); blockMap.set(`${x},${y},${z}`, b);
    }
    
    // Initial World Gen
    for (let x = -15; x < 15; x++) for (let z = -15; z < 15; z++) {
      let h = Math.floor(Math.sin(x/5)*2 + Math.cos(z/5)*2);
      for (let y = h-3; y <= h; y++) addBlock(x, y, z, y===h ? mats.dirt : mats.stone); // Simplified gen to save space
      if (Math.random() < 0.03) {
        for(let ty=1; ty<=3; ty++) addBlock(x, h+ty, z, mats.wood);
        for(let lx=-1; lx<=1; lx++) for(let lz=-1; lz<=1; lz++) if(!blockMap.has(`${x+lx},${h+4},${z+lz}`)) addBlock(x+lx, h+4, z+lz, mats.leaves);
      }
    }

    // --- State & Controls ---
    let isPlaying = false;
    document.getElementById('btn-play').onclick = () => { camera.position.set(0, 10, 0); document.body.requestPointerLock(); };
    document.getElementById('btn-resume').onclick = () => document.body.requestPointerLock();

    document.addEventListener('pointerlockchange', () => {
      isPlaying = document.pointerLockElement === document.body;
      document.getElementById('main-menu').style.display = 'none';
      document.getElementById('pause-menu').style.display = isPlaying ? 'none' : 'flex';
      document.getElementById('hud').style.display = isPlaying ? 'flex' : 'none';
      document.getElementById('crosshair').style.display = isPlaying ? 'block' : 'none';
    });

    const keys = { w: false, a: false, s: false, d: false, space: false, shift: false, ctrl: false };
    document.addEventListener('keydown', (e) => {
      if(!isPlaying) return;
      if(e.code==='KeyW') keys.w=true; if(e.code==='KeyA') keys.a=true; if(e.code==='KeyS') keys.s=true; if(e.code==='KeyD') keys.d=true;
      if(e.code==='Space') keys.space=true; if(e.code==='ShiftLeft') keys.shift=true; if(e.code==='ControlLeft') keys.ctrl=true;
      
      // Hotbar selection (1-9)
      if(e.key >= '1' && e.key <= '9') { activeSlot = parseInt(e.key) - 1; renderHotbar(); }
    });
    document.addEventListener('keyup', (e) => {
      if(e.code==='KeyW') keys.w=false; if(e.code==='KeyA') keys.a=false; if(e.code==='KeyS') keys.s=false; if(e.code==='KeyD') keys.d=false;
      if(e.code==='Space') keys.space=false; if(e.code==='ShiftLeft') keys.shift=false; if(e.code==='ControlLeft') keys.ctrl=false;
    });

    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    document.addEventListener('mousemove', (e) => {
      if (!isPlaying) return;
      euler.setFromQuaternion(camera.quaternion); euler.y -= e.movementX * 0.002; euler.x -= e.movementY * 0.002;
      euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x)); camera.quaternion.setFromEuler(euler);
    });

    // --- Building & Breaking ---
    const raycaster = new THREE.Raycaster(); const center = new THREE.Vector2(0, 0);
    document.addEventListener('mousedown', (e) => {
      if (!isPlaying) return;
      raycaster.setFromCamera(center, camera); const hits = raycaster.intersectObjects(blocks);
      if (hits.length > 0 && hits[0].distance < 5) {
        if (e.button === 0) { // Break & Spawn Drop with Velocity
          let b = hits[0].object; scene.remove(b); blocks.splice(blocks.indexOf(b), 1); blockMap.delete(`${b.position.x},${b.position.y},${b.position.z}`);
          
          let drop = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), b.material);
          drop.position.copy(b.position);
          // Pop out slightly towards player
          drop.userData = { vy: 3, matType: b.material.name }; 
          scene.add(drop); drops.push(drop);

        } else if (e.button === 2) { // Place from Active Slot
          let item = inventory[activeSlot];
          if(item && item.type && item.count > 0) {
            const p = new THREE.Vector3().copy(hits[0].point).add(hits[0].face.normal.clone().multiplyScalar(0.5));
            p.floor().addScalar(0.5);
            if (!blockMap.has(`${p.x},${p.y},${p.z}`)) {
              addBlock(p.x, p.y, p.z, mats[item.type]);
              item.count--; if(item.count === 0) item.type = null; // Remove if empty
              renderHotbar();
            }
          }
        }
      }
    });

    // --- Game Loop (Real Speeds & Drop Gravity) ---
    let vel = new THREE.Vector3(), canJump = false, time = performance.now(), dayTime = Math.PI/2;
    function checkWall(x, y, z) { let bx = Math.round(x), bz = Math.round(z); return blockMap.has(`${bx},${Math.floor(y)},${bz}`) || blockMap.has(`${bx},${Math.floor(y-1)},${bz}`); }

    function animate() {
      requestAnimationFrame(animate); const now = performance.now(); const delta = Math.min((now - time) / 1000, 0.1); time = now;

      dayTime += delta * 0.02; skyPivot.rotation.z = dayTime;
      clouds.forEach(c => { c.position.x += 1 * delta; if(c.position.x > 30) c.position.x = -30; });

      if (isPlaying) {
        // Player Math (Minecraft Speeds: Walk ~4.3, Sprint ~5.6, Crouch ~1.5)
        let speed = keys.ctrl ? 12.0 : (keys.shift ? 4.0 : 8.0); // Adjusted for friction
        vel.x -= vel.x * 8.0 * delta; vel.z -= vel.z * 8.0 * delta; vel.y -= 25.0 * delta;

        const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
        const right = new THREE.Vector3(); right.crossVectors(camera.up, dir).normalize();
        let mX = 0, mZ = 0;
        if (keys.w) { mX += dir.x * speed * delta; mZ += dir.z * speed * delta; }
        if (keys.s) { mX -= dir.x * speed * delta; mZ -= dir.z * speed * delta; }
        if (keys.a) { mX += right.x * speed * delta; mZ += right.z * speed * delta; }
        if (keys.d) { mX -= right.x * speed * delta; mZ -= right.z * speed * delta; }

        if(!checkWall(camera.position.x + vel.x*delta + mX, camera.position.y, camera.position.z)) { vel.x += mX / delta; camera.position.x += vel.x * delta; } else vel.x = 0;
        if(!checkWall(camera.position.x, camera.position.y, camera.position.z + vel.z*delta + mZ)) { vel.z += mZ / delta; camera.position.z += vel.z * delta; } else vel.z = 0;

        camera.position.y += vel.y * delta;
        raycaster.set(camera.position, new THREE.Vector3(0, -1, 0)); const floorHits = raycaster.intersectObjects(blocks);
        let cOff = keys.shift ? -0.4 : 0;
        if (floorHits.length > 0 && floorHits[0].distance < 1.6 - cOff) { vel.y = 0; camera.position.y = floorHits[0].point.y + 1.6 + cOff; canJump = true; } else canJump = false;
        if (keys.space && canJump) { vel.y = 8.0; canJump = false; }

        // Drop Gravity & Magnetism
        for (let i = drops.length - 1; i >= 0; i--) {
          let d = drops[i];
          d.rotation.y += 2 * delta; // Spin
          
          // Apply Item Gravity
          d.userData.vy -= 15 * delta;
          d.position.y += d.userData.vy * delta;
          
          // Item Floor collision
          let dropFloor = Math.floor(d.position.y);
          if (blockMap.has(`${Math.round(d.position.x)},${dropFloor},${Math.round(d.position.z)}`)) {
             if (d.position.y < dropFloor + 0.65) { d.position.y = dropFloor + 0.65; d.userData.vy = 0; }
          }

          if (camera.position.distanceTo(d.position) < 2.0) { // Magnet pickup
            pickupItem(d.userData.matType); scene.remove(d); drops.splice(i, 1);
          }
        }
      }
      renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
  </script>
</body>
</html>
