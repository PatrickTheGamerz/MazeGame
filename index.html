<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ORANGECRAFT V9 - THE GLORY UPDATE</title>
  <style>
    body{margin:0;overflow:hidden;background:#000;font-family:'Courier New',Courier,monospace;user-select:none;color:#fff}
    #crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);pointer-events:none;z-index:100;display:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.9)}
    #crosshair::before{top:9px;left:0;width:20px;height:2px}#crosshair::after{top:0;left:9px;width:2px;height:20px}
    #hud{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;z-index:100;pointer-events:none}
    .stats{display:flex;justify-content:space-between;width:380px;text-shadow:2px 2px 0 #000;margin-bottom:5px;font-size:24px}
    .hearts{color:#ff3333;letter-spacing:2px}.hunger{color:#cc6600;letter-spacing:2px}
    #hotbar-display{display:flex;background:rgba(0,0,0,0.5);border:2px solid #555;padding:2px;margin-bottom:10px}
    .slot{width:36px;height:36px;border:2px solid #888;background:rgba(100,100,100,0.8);margin:0 2px;position:relative;font-size:12px;text-align:center;line-height:36px}
    .slot.active{border:2px solid #fff;box-shadow:0 0 10px #fff}
    .item-count{position:absolute;bottom:2px;right:4px;line-height:1;font-size:14px;pointer-events:none;text-shadow:1px 1px #000}
    
    .menu-overlay{position:absolute;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.7);z-index:200;backdrop-filter:blur(3px)}
    .title{font-size:5rem;color:#FFA500;text-shadow:4px 4px 0 #333;margin-bottom:30px;font-weight:bold;font-family: Impact;position:relative}
    .splash{position:absolute;top:70px;right:-60px;color:#FF0;font-size:1.5rem;animation:pulse 0.5s infinite alternate;text-shadow:2px 2px #000; transform: rotate(-20deg);}
    @keyframes pulse{from{transform:rotate(-20deg) scale(1)}to{transform:rotate(-20deg) scale(1.1)}}
    
    .btn{width:310px;padding:12px;margin:6px;background:#777;border:2px solid #000;border-top-color:#aaa;border-left-color:#aaa;color:#fff;cursor:pointer;text-align:center;font-size:1.2rem}
    .btn:hover{background:#888}

    .inv-container{background:#c6c6c6;padding:15px;border:3px solid #000;display:flex;flex-direction:column;pointer-events:auto; box-shadow: 10px 10px 0 rgba(0,0,0,0.3);}
    .inv-slot{width:36px;height:36px;background:#8b8b8b;border:2px solid #555;border-top-color:#333;border-left-color:#333;border-bottom-color:#fff;border-right-color:#fff;position:relative;cursor:pointer}
    .inv-slot:hover{background:#999}
    .inv-main{display:grid;grid-template-columns:repeat(9,36px);gap:4px;justify-content:center;margin-top:10px}
    
    .steve-preview{width:100px;height:140px;background:#8b8b8b;border:2px solid #555;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
    .s-head{width:32px;height:32px;background:#b58165;border-top:8px solid #4d301b}
    .s-body{width:32px;height:40px;background:#00aaae}
    .s-arm{width:12px;height:40px;background:#b58165;position:absolute;top:40px;border-top:12px solid #00aaae}
    .s-leg{width:15px;height:40px;background:#3131b0;border-bottom:6px solid #606060}

    #drag-icon{position:fixed;pointer-events:none;z-index:300;width:36px;height:36px;display:none;border:2px solid #fff; box-shadow: 4px 4px 0 rgba(0,0,0,0.5);}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="crosshair"></div>
  <div id="drag-icon"></div>
  <div id="hud">
    <div class="stats"><div class="hearts" id="hp-bar">♥♥♥♥♥♥♥♥♥♥</div><div class="hunger">🍖🍖🍖🍖🍖🍖🍖🍖🍖🍖</div></div>
    <div id="hotbar-display"></div>
  </div>

  <div id="main-menu" class="menu-overlay" style="display:flex">
    <div class="title">ORANGECRAFT<div class="splash" id="splash-text">Truly Perfecto!</div></div>
    <div class="btn" onclick="startGame()">Singleplayer</div>
    <div class="btn" style="color:#888; cursor:default">Multiplayer (Coming Soon)</div>
    <div class="btn" onclick="window.location.reload()">Reset World</div>
  </div>

  <div id="pause-menu" class="menu-overlay">
    <div style="font-size:1.5rem;margin-bottom:20px; text-shadow:2px 2px #000">Game Menu</div>
    <div class="btn" onclick="setMenu('PLAYING')">Back to Game</div>
    <div class="btn" onclick="setMenu('MAIN_MENU')">Save and Quit to Title</div>
  </div>

  <div id="inventory-screen" class="menu-overlay">
    <div class="inv-container">
      <div style="display:flex; justify-content:space-between; margin-bottom:10px">
        <div style="display:flex;flex-direction:column;gap:4px">
          <div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div><div class="inv-slot"></div>
        </div>
        <div class="steve-preview">
           <div class="s-head"></div><div class="s-body"></div>
           <div class="s-arm" style="left:18px"></div><div class="s-arm" style="right:18px"></div>
           <div style="display:flex"><div class="s-leg" style="margin-right:2px"></div><div class="s-leg"></div></div>
        </div>
        <div style="text-align:center">
          <div style="color:#333;font-size:12px;margin-bottom:5px;font-weight:bold">Crafting</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px" id="craft-input-grid">
            <div class="inv-slot" data-c="0"></div><div class="inv-slot" data-c="1"></div>
            <div class="inv-slot" data-c="2"></div><div class="inv-slot" data-c="3"></div>
          </div>
          <div style="margin-top:10px; display:flex; align-items:center; justify-content:center">
            <div style="color:#333; font-size:20px; margin-right:10px">→</div>
            <div class="inv-slot" id="craft-output-slot"></div>
          </div>
        </div>
      </div>
      <div style="color:#333; font-size:12px; font-weight:bold">Inventory</div>
      <div class="inv-main" id="main-inv-grid"></div>
      <div class="inv-main" id="hotbar-inv-grid" style="margin-top:10px"></div>
    </div>
  </div>

  <script>
    // --- 1. DATA & CONSTANTS ---
    const uiC = { grass: '#50a050', dirt: '#6e4628', stone: '#787878', wood: '#462814', leaves: '#327832', planks: '#967846', stick: '#4b3c23', crafting_table: '#644628', bedrock: '#222' };
    const splashes = ["Collisions fixed!", "Snap-to-grid!", "Day/Night restored!", "Steve is here!", "Inventory works!", "No more ghosting!"];
    
    let inventory = Array(36).fill(null).map(() => ({type: null, count: 0}));
    let craftingGrid = Array(4).fill(null).map(() => ({type: null, count: 0}));
    let craftResult = {type: null, count: 0};
    let activeSlot = 0;
    let dragItem = null;
    let gameState = "MAIN_MENU";
    let hp = 20;

    // --- 2. ENGINE SETUP ---
    const sc = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const rnd = new THREE.WebGLRenderer({antialias:false});
    rnd.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(rnd.domElement);

    const skyP = new THREE.Object3D(); sc.add(skyP);
    const sun = new THREE.DirectionalLight(0xffffff, 0.8); skyP.add(sun);
    const amb = new THREE.AmbientLight(0xffffff, 0.4); sc.add(amb);
    
    let stG = new THREE.BufferGeometry(), stV = [];
    for(let i=0; i<500; i++) stV.push(Math.random()*400-200, Math.random()*200, Math.random()*400-200);
    stG.setAttribute('position', new THREE.Float32BufferAttribute(stV, 3));
    let stars = new THREE.Points(stG, new THREE.PointsMaterial({color:0xffffff, size:0.5, transparent:true, opacity:0}));
    sc.add(stars);

    // World Map
    let blks = [], bMap = new Map();
    const boxG = new THREE.BoxGeometry(1,1,1);
    function addB(x,y,z,type){
      const mat = new THREE.MeshLambertMaterial({color: uiC[type] || 0xffffff});
      const b = new THREE.Mesh(boxG, mat);
      b.position.set(x,y,z); b.name = type;
      sc.add(b); blks.push(b); bMap.set(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`, b);
    }

    // World Gen
    for(let x=-15; x<15; x++) for(let z=-15; z<15; z++) {
      let h = Math.floor(Math.sin(x/6)*2 + Math.cos(z/6)*2);
      addB(x, h, z, 'grass');
      addB(x, h-1, z, 'dirt');
      if(Math.random() < 0.015) {
        for(let tr=1; tr<5; tr++) addB(x, h+tr, z, 'wood');
        for(let lx=-1; lx<=1; lx++) for(let lz=-1; lz<=1; lz++) addB(x+lx, h+5, z+lz, 'leaves');
      }
    }

    // --- 3. UI & INVENTORY LOGIC ---
    function updateUI() {
      const hDisp = document.getElementById('hotbar-display');
      const hInv = document.getElementById('hotbar-inv-grid');
      const mInv = document.getElementById('main-inv-grid');
      const cGrid = document.getElementById('craft-input-grid');
      const cOut = document.getElementById('craft-output-slot');

      hDisp.innerHTML = ''; hInv.innerHTML = ''; mInv.innerHTML = '';

      inventory.forEach((item, i) => {
        let slot = createSlot(item, () => startDrag(inventory, i));
        if(i < 9) {
          hInv.appendChild(slot);
          let hs = document.createElement('div');
          hs.className = 'slot' + (i === activeSlot ? ' active' : '');
          if(item.type) { hs.style.background = uiC[item.type]; hs.innerHTML = `<span class="item-count">${item.count}</span>`; }
          hDisp.appendChild(hs);
        } else mInv.appendChild(slot);
      });

      Array.from(cGrid.children).forEach((slot, i) => {
        let item = craftingGrid[i];
        slot.style.background = item.type ? uiC[item.type] : '#8b8b8b';
        slot.innerHTML = item.count > 0 ? `<span class="item-count">${item.count}</span>` : '';
        slot.onmousedown = () => startDrag(craftingGrid, i);
      });

      cOut.style.background = craftResult.type ? uiC[craftResult.type] : '#8b8b8b';
      cOut.innerHTML = craftResult.count > 0 ? `<span class="item-count">${craftResult.count}</span>` : '';
      cOut.onmousedown = takeCraft;
    }

    function createSlot(item, onDown) {
      let d = document.createElement('div'); d.className = 'inv-slot';
      if(item.type) { d.style.background = uiC[item.type]; d.innerHTML = `<span class="item-count">${item.count}</span>`; }
      d.onmousedown = onDown;
      return d;
    }

    function startDrag(arr, idx) {
      if(dragItem) {
        let temp = {...arr[idx]};
        arr[idx] = {...dragItem.data};
        dragItem.source[dragItem.idx] = temp;
        dragItem = null;
        document.getElementById('drag-icon').style.display = 'none';
      } else if(arr[idx].type) {
        dragItem = { source: arr, idx: idx, data: {...arr[idx]} };
        arr[idx] = {type: null, count: 0};
        let icon = document.getElementById('drag-icon');
        icon.style.display = 'block'; icon.style.background = uiC[dragItem.data.type];
      }
      checkRecipes(); updateUI();
    }

    function checkRecipes() {
      let g = craftingGrid.map(i => i.type);
      craftResult = {type: null, count: 0};
      if(craftingGrid.filter(i=>i.type).length === 1 && g.includes('wood')) craftResult = {type: 'planks', count: 4};
      if((g[0]==='planks' && g[2]==='planks' && !g[1] && !g[3]) || (g[1]==='planks' && g[3]==='planks' && !g[0] && !g[2])) craftResult = {type: 'stick', count: 4};
      if(g.every(t => t === 'planks')) craftResult = {type: 'crafting_table', count: 1};
    }

    function takeCraft() {
      if(!craftResult.type) return;
      let added = false;
      for(let i=0; i<36; i++) { if(!inventory[i].type) { inventory[i] = {...craftResult}; added = true; break; } }
      if(added) { craftingGrid.forEach(i => { if(i.count > 0) i.count--; if(i.count === 0) i.type = null; }); checkRecipes(); updateUI(); }
    }

    // --- 4. COLLISIONS & PHYSICS ENGINE ---
    let keys = {}, dTm = 0, vel = new THREE.Vector3();
    const playerWidth = 0.3;

    function checkCollision(pos) {
      // Checks if a position (camera) intersects any block in the map
      let x = Math.round(pos.x);
      let z = Math.round(pos.z);
      let yFloor = Math.floor(pos.y - 1.6); // Feet
      let yHead = Math.floor(pos.y);       // Head

      return bMap.has(`${x},${yFloor},${z}`) || bMap.has(`${x},${yHead},${z}`);
    }

    function startGame() { cam.position.set(0, 10, 0); setMenu('PLAYING'); }

    function setMenu(s) {
      gameState = s;
      document.querySelectorAll('.menu-overlay').forEach(m => m.style.display = 'none');
      document.getElementById('hud').style.display = s==="PLAYING"?'flex':'none';
      document.getElementById('crosshair').style.display = s==="PLAYING"?'block':'none';
      if(s === "PLAYING") document.body.requestPointerLock();
      else {
        document.exitPointerLock(); 
        if(s === "INV") document.getElementById('inventory-screen').style.display = 'flex';
        else if(s === "PAUSE_MENU") document.getElementById('pause-menu').style.display = 'flex';
        else document.getElementById('main-menu').style.display = 'flex';
      }
      updateUI();
    }

    // --- 5. INPUTS ---
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if(e.code === 'KeyE') setMenu(gameState === "INV" ? "PLAYING" : "INV");
      if(e.code === 'Escape' && gameState === "PLAYING") setMenu("PAUSE_MENU");
      if(e.key >= '1' && e.key <= '9') { activeSlot = parseInt(e.key)-1; updateUI(); }
    });
    document.addEventListener('keyup', e => keys[e.code] = false);

    document.addEventListener('mousemove', e => {
      if(gameState === "PLAYING") {
        cam.rotation.y -= e.movementX * 0.002;
        cam.rotation.x -= e.movementY * 0.002;
        cam.rotation.x = Math.max(-1.5, Math.min(1.5, cam.rotation.x));
      }
      if(dragItem) {
        let d = document.getElementById('drag-icon');
        d.style.left = e.clientX - 18 + 'px'; d.style.top = e.clientY - 18 + 'px';
      }
    });
    cam.rotation.order = "YXZ";

    // --- 6. GAME LOOP ---
    function animate() {
      requestAnimationFrame(animate);
      let dt = 0.016;

      // SKY CYCLE
      dTm += dt * 0.03;
      skyP.rotation.z = dTm;
      let sY = Math.sin(dTm + Math.PI/2);
      sc.background = new THREE.Color(sY > 0.1 ? 0x87CEEB : (sY > -0.1 ? 0xffa500 : 0x050510));
      stars.material.opacity = sY < 0 ? 1 : 0;
      sun.position.set(Math.cos(dTm)*100, Math.sin(dTm)*100, 0);

      if(gameState === "PLAYING") {
        let speed = keys['ControlLeft'] ? 0.18 : 0.12; 
        let dir = new THREE.Vector3(); cam.getWorldDirection(dir); dir.y = 0; dir.normalize();
        let side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();
        
        let nextPos = cam.position.clone();
        let moveX = 0, moveZ = 0;

        if(keys['KeyW']) { moveX += dir.x * speed; moveZ += dir.z * speed; }
        if(keys['KeyS']) { moveX -= dir.x * speed; moveZ -= dir.z * speed; }
        if(keys['KeyA']) { moveX += side.x * speed; moveZ += side.z * speed; }
        if(keys['KeyD']) { moveX -= side.x * speed; moveZ -= side.z * speed; }

        // Slide Collision Detection
        let testX = cam.position.clone(); testX.x += moveX;
        if(!checkCollision(testX)) cam.position.x += moveX;
        
        let testZ = cam.position.clone(); testZ.z += moveZ;
        if(!checkCollision(testZ)) cam.position.z += moveZ;

        // Gravity & Vertical Collision
        vel.y -= 0.015;
        cam.position.y += vel.y;
        
        if(checkCollision(cam.position)) {
          if(vel.y < 0) { // Hit floor
            cam.position.y = Math.floor(cam.position.y) + 0.6;
            vel.y = 0;
            if(keys['Space']) vel.y = 0.25;
          } else { // Hit ceiling
            vel.y = 0;
          }
        }

        if(cam.position.y < -20) { hp -= 0.2; updateHP(); if(hp<=0) location.reload(); }
      } else if(gameState === "MAIN_MENU") {
        cam.rotation.y += 0.002;
        cam.position.set(0, 10, 0);
      }
      rnd.render(sc, cam);
    }

    function updateHP() {
      let s = ""; for(let i=0; i<10; i++) s += (i < hp/2) ? "♥" : "♡";
      document.getElementById('hp-bar').innerText = s;
    }

    // Interaction (Break & Place)
    document.addEventListener('mousedown', e => {
      if(gameState !== "PLAYING") return;
      const ray = new THREE.Raycaster();
      ray.setFromCamera(new THREE.Vector2(0,0), cam);
      let hits = ray.intersectObjects(blks);
      if(hits.length > 0 && hits[0].distance < 5) {
        let b = hits[0].object;
        if(e.button === 0) { // Break
          sc.remove(b); bMap.delete(`${Math.round(b.position.x)},${Math.round(b.position.y)},${Math.round(b.position.z)}`);
          blks.splice(blks.indexOf(b), 1);
          let type = b.name;
          for(let i=0; i<36; i++) { if(!inventory[i].type || inventory[i].type === type) { inventory[i].type = type; inventory[i].count++; break; } }
          updateUI();
        } else if(e.button === 2) { // Place
          let item = inventory[activeSlot];
          if(item.type && item.count > 0 && item.type !== 'stick') {
            let p = b.position.clone().add(hits[0].face.normal);
            p.x = Math.round(p.x); p.y = Math.round(p.y); p.z = Math.round(p.z);
            if(!bMap.has(`${p.x},${p.y},${p.z}`)) {
              addB(p.x, p.y, p.z, item.type);
              item.count--; if(item.count === 0) item.type = null;
              updateUI();
            }
          }
        }
      }
    });

    document.getElementById('splash-text').innerText = splashes[Math.floor(Math.random()*splashes.length)];
    updateUI();
    animate();
  </script>
</body>
</html>
